<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#080c10"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#7B9BAF" stroke-width="1.5"/>
  <!-- Tilted ring -->
  <ellipse cx="16" cy="16" rx="13" ry="5" fill="none" stroke="#7B9BAF" stroke-width="1" opacity="0.7"/>
  <!-- Meridian ring -->
  <ellipse cx="16" cy="16" rx="5" ry="13" fill="none" stroke="#7B9BAF" stroke-width="1" opacity="0.7"/>
  <!-- Center star -->
  <circle cx="16" cy="16" r="2.5" fill="#FFD2A1"/>
  <circle cx="16" cy="16" r="1.2" fill="#FFF4EA"/>
  <!-- Axis pole top/bottom -->
  <line x1="16" y1="3" x2="16" y2="7" stroke="#4a6a80" stroke-width="1.5"/>
  <line x1="16" y1="25" x2="16" y2="29" stroke="#4a6a80" stroke-width="1.5"/>
</svg>
